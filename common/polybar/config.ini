[colors]

background = #aa7ec8e3
foreground = #1a1a1a
primary = #4dbb42
alert = #e63946
disabled = #707880
white = #ffffff

[bar/main]
width = 98%
height = 30pt
offset-x = 1%
offset-y = 1%
radius = 15

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 2pt
border-color = #ccffffff

padding-left = 2
padding-right = 2
module-margin = 1


font-0 = "JetBrainsMono Nerd Font:style=Bold:size=11;2"
font-1 = "JetBrainsMono Nerd Font:size=14;3"

modules-left = xworkspaces
modules-center = date
modules-right = pulseaudio memory cpu battery

cursor-click = pointer

[module/xworkspaces]
type = internal/xworkspaces


icon-0 = 1;
icon-1 = 2;󰠮
icon-2 = 3;󰅩
icon-3 = 4;
icon-4 = 5;󰙯
icon-default = 

label-active = %icon%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.white}
label-active-underline = ${colors.white}
label-active-padding = 2

label-occupied = %icon%
label-occupied-padding = 2
label-occupied-foreground = #444444

label-urgent = %icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %icon%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.primary}
label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/date]
type = internal/date
interval = 1
date = %H:%M
label = %date%
label-foreground = ${colors.foreground}

[module/battery]
type = internal/battery
full-at = 99
battery = BAT0
adapter = AC
format-charging = <label-charging>
label-charging = 󱐥 %percentage%%
format-discharging = <label-discharging>
label-discharging = 󰁹 %percentage%%
