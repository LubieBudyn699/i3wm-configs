corner-radius = 12;

shadow = true;
shadow-radius = 15;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.4;
shadow-color = "#7ec8e3";

active-opacity = 0.92;
inactive-opacity = 0.85;

backend = "glx";
blur: {
  method = "dual_kawase";
  strength = 8;
  background = true;
};

blur-background-exclude = [
  "window_type = 'menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "window_type = 'tooltip'"
];
